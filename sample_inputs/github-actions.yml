name: Deploy to AWS Lambda via Comment

on:
  issue_comment:
    types: [created]

jobs:
  deploy:
    # Only run if it's a PR comment and matches the slash command pattern
    if: |
      github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/deploy:us-east-1') || startsWith(github.event.comment.body, '/deploy:us-east-2'))
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Extract Region from Comment
        id: get-region
        run: |
          COMMENT="${{ github.event.comment.body }}"
          # Extracts the part after '/deploy:'
          REGION=$(echo "$COMMENT" | sed -e 's/\/deploy://' | xargs)
          echo "region=$REGION" >> $GITHUB_OUTPUT

      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          # issue_comment events default to the default branch (e.g., main). 
          # We must explicitly checkout the PR's branch code.
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --production

      - name: Create Deployment Package (ZIP)
        run: zip -r deployment.zip . -x "*.git*" "*.github*"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Assuming you are using OIDC role as per instructions
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-lambda-role 
          aws-region: ${{ steps.get-region.outputs.region }}

      - name: Deploy ZIP and Update Lambda Configuration
        run: |
          # 1. Upload the code binary to the function
          aws lambda update-function-code \
            --function-name lambda-greeter \
            --zip-file fileb://deployment.zip \
            --region ${{ steps.get-region.outputs.region }}

          # Wait briefly for the code update to successfully process before updating env vars
          aws lambda wait function-updated --function-name lambda-greeter --region ${{ steps.get-region.outputs.region }}

          # 2. Update environment variables dynamically
          aws lambda update-function-configuration \
            --function-name lambda-greeter \
            --region ${{ steps.get-region.outputs.region }} \
            --environment "Variables={language='${{ vars.LANGUAGE }}',support_email='${{ vars.SUPPORT_EMAIL }}',github_pr='${{ github.event.issue.number }}'}"